services:
  # Serves the static files (HTML, WASM, Assets)
  html-server:
    container_name: html-server
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: python web/server_fast.py
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - maplestory-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Proxies WebSocket connections to the TCP Game Server
  ws-proxy:
    container_name: ws-proxy
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    # to ensure the client connects to 'host.docker.internal' or configure
    # this proxy to route correctly.
    command: python -u web/ws_proxy.py --ws-port 8080
    environment:
      - IS_DOCKER=true
      - WS_PROXY_LOCALHOST_TARGET=host.docker.internal
      # SECURITY: the browser names the TCP target, so restrict what the proxy may
      # dial. Unset = allow only loopback/Docker-host (safe default). For a public
      # deployment set this to the game server explicitly, e.g.
      # WS_PROXY_ALLOWED_TARGETS=host.docker.internal:8484,host.docker.internal:7575-7600
      # - WS_PROXY_ALLOWED_TARGETS=host.docker.internal
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    networks:
      - maplestory-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8080)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Serves assets via WebSocket for LazyFS
  assets-server:
    container_name: assets-server
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: python web/assets_server.py --port 8765 --directory .
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    networks:
      - maplestory-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8765)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Builder service - run with: docker-compose run --rm wasm-builder
  wasm-builder:
    container_name: wasm-builder
    build:
      context: .
      dockerfile: docker/builder.Dockerfile
    volumes:
      - .:/app
      # Persist Emscripten system library cache (zlib/freetype/etc.) between
      # one-off `docker compose run --rm wasm-builder ...` invocations.
      - emscripten-cache:/emsdk/upstream/emscripten/cache
    networks:
      - maplestory-network
    profiles: ["tools"]

networks:
  # Compose-managed network — created automatically on `docker compose up`.
  # Previously declared external: true which required manual pre-creation.
  # The explicit name: ensures the network is not prefixed with the project name,
  # keeping it compatible with scripts/docker_setup.sh and scripts/run_all.sh.
  maplestory-network:
    name: maplestory-network
    driver: bridge

volumes:
  emscripten-cache:
