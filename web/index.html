<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapleStory</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23121821'/%3E%3Cpath fill='%23ff5252' d='M16 4l2.2 5.1 5.3-1.3-2.6 4.8 4.8 2.6-5.1 1.3 1.3 5.3-4.8-2.6L16 28l-1.4-5.5-4.8 2.6 1.3-5.3-5.1-1.3 4.8-2.6L8 8.8l5.3 1.3z'/%3E%3C/svg%3E">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }

        #container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #canvas {
            border: none;
            background-color: #000;
            display: block;
            outline: none;
            cursor: none;
            /* Fallback for the pre-engine 800x600 surface; once the engine
               drives a native-resolution backing store no CSS scaling occurs. */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* Branded loading overlay shown until the engine runtime is ready. */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            background: radial-gradient(circle at 50% 38%, #1b2330 0%, #0a0d13 70%, #05070a 100%);
            transition: opacity 0.6s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading .logo {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #fff 0%, #ffd0d0 60%, #ff7676 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 18px rgba(255, 80, 80, 0.25);
        }

        #loading .logo span {
            color: #ff5252;
            -webkit-text-fill-color: #ff5252;
        }

        #loading .spinner {
            width: 46px;
            height: 46px;
            border: 4px solid rgba(255, 255, 255, 0.12);
            border-top-color: #ff5252;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading .status {
            font-size: 13px;
            color: #8b96a8;
            min-height: 16px;
            letter-spacing: 0.3px;
        }
    </style>
</head>

<body>
    <div id="container">
        <canvas id="canvas" tabindex="-1"></canvas>
    </div>

    <!-- MapleBridge React/TS overlay UI mount point. -->
    <div id="maple-ui-root"></div>

    <div id="loading">
        <div class="logo">Maple<span>Story</span></div>
        <div class="spinner"></div>
        <div class="status" id="loading-status">Loading game…</div>
    </div>

    <!-- HD UI override loader: preloads high-res UI art and bridges it to WASM. -->
    <script src="/web/hd_assets.js"></script>

    <script>
        (function () {
            const GAME_WIDTH = 800;
            const GAME_HEIGHT = 600;

            function syncCanvasResolution(canvas, cssWidth, cssHeight) {
                const setSize = (typeof Module !== 'undefined' && typeof Module._wasm_set_canvas_size === 'function')
                    ? Module._wasm_set_canvas_size
                    : null;

                if (setSize) {
                    // Native-resolution backing store: the engine renders the
                    // 800x600 scene and GPU-upscales it to display pixels.
                    const dpr = window.devicePixelRatio || 1;
                    setSize(
                        Math.max(1, Math.round(cssWidth * dpr)),
                        Math.max(1, Math.round(cssHeight * dpr))
                    );
                } else if (canvas.width !== GAME_WIDTH || canvas.height !== GAME_HEIGHT) {
                    // Engine not loaded yet: keep the game-resolution surface.
                    canvas.width = GAME_WIDTH;
                    canvas.height = GAME_HEIGHT;
                }
            }

            function getFittedCanvasSize(viewW, viewH) {
                if (viewW * GAME_HEIGHT <= viewH * GAME_WIDTH) {
                    const width = Math.max(1, Math.floor(viewW));
                    return {
                        width,
                        height: Math.max(1, Math.floor(width * GAME_HEIGHT / GAME_WIDTH))
                    };
                }

                const height = Math.max(1, Math.floor(viewH));
                return {
                    width: Math.max(1, Math.floor(height * GAME_WIDTH / GAME_HEIGHT)),
                    height
                };
            }

            function fitCanvas() {
                const canvas = document.getElementById('canvas');
                if (!canvas) {
                    return;
                }

                const { width, height } = getFittedCanvasSize(window.innerWidth, window.innerHeight);

                // Resize the engine's backing store first: Emscripten clears the
                // inline CSS size during the resize, so the CSS scale goes last.
                syncCanvasResolution(canvas, width, height);

                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
            }

            window.MapleWasmUI = {
                applyScale: fitCanvas
            };

            window.addEventListener('resize', fitCanvas);
            document.addEventListener('fullscreenchange', fitCanvas);
            fitCanvas();
        })();

        Module = {
            canvas: (function () {
                let canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. You will need to reload the page.');
                    e.preventDefault();
                }, false);
                canvas.addEventListener("click", function () {
                    canvas.focus();
                });
                return canvas;
            })(),

            // Disable stdin to prevent annoying prompt() popups
            preRun: [function () {
                function stdin() {
                    return null; // Return null for EOF
                }
                FS.init(stdin, null, null);
            }],

            print: function (text) {
                console.log('[stdout]', text);
            },

            printErr: function (text) {
                console.error('[stderr]', text);
            },

            setStatus: function (text) {
                if (text) {
                    console.log('[status]', text);
                    var el = document.getElementById('loading-status');
                    if (el) {
                        el.textContent = text;
                    }
                }
            },

            monitorRunDependencies: function (left) {
                console.log('[dependencies]', left, 'remaining');
                var el = document.getElementById('loading-status');
                if (el) {
                    el.textContent = left > 0
                        ? 'Loading game data… (' + left + ')'
                        : 'Starting engine…';
                }
            },

            onRuntimeInitialized: function () {
                console.log('[runtime] Initialized');
                if (window.MapleWasmUI && window.MapleWasmUI.applyScale) {
                    window.MapleWasmUI.applyScale();
                }
                // Reveal the game once the engine is up; give the first frame a
                // moment to render so we don't flash a black canvas.
                setTimeout(function () {
                    var overlay = document.getElementById('loading');
                    if (overlay) {
                        overlay.classList.add('hidden');
                        setTimeout(function () { overlay.remove(); }, 700);
                    }
                }, 600);
            },

            // Bridge for the HD asset override system (see hd_assets.js).
            hdGetScaled: function (key, hw, hh, ptr) {
                return (window.MapleHD && window.MapleHD.getScaled)
                    ? window.MapleHD.getScaled(key, hw, hh, ptr)
                    : 0;
            },

            // Function to add C++ logs - now just console
            addCppLog: function (level, message) {
                let timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
                console.log('[' + timestamp + '] [' + level + '] ' + message);
            }
        };

        console.log('[status] Downloading...');

        window.onerror = function (event) {
            console.error('[post-exception status] Exception thrown, see JavaScript console');
        };

        // Fetch configuration before loading the client
        fetch('/web/config.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(config => {
                if (config) {
                    let hasConfig = false;
                    const lazyConfig = {};

                    const lazyConfigKeys = [
                        'AssetsServerIP', 'AssetsServerPort',
                        'MapleStoryServerIp', 'MapleStoryServerPort',
                        'ProxyIP', 'ProxyPort', 'AssetsServerProtocol'
                    ];

                    lazyConfigKeys.forEach(key => {
                        if (config[key] !== undefined && config[key] !== null) {
                            lazyConfig[key] = config[key];
                            console.log(`[config] Set ${key} from config.json:`, config[key]);
                            hasConfig = true;
                        }
                    });

                    if (hasConfig) {
                        Module.LazyFS = Object.assign(Module.LazyFS || {}, lazyConfig);
                    }
                }
                loadWasmClient();
            })
            .catch(err => {
                console.warn('[config] Could not load /web/config.json, proceeding with defaults. Error:', err.message);
                loadWasmClient();
            });

        function loadWasmClient() {
            const script = document.createElement('script');
            script.src = '/build/JourneyClient.js';
            script.async = true;
            document.body.appendChild(script);
        }
    </script>

    <!-- MapleBridge overlay UI bundle. -->
    <link rel="stylesheet" href="/web/ui/dist/maple-ui.css" />
    <script type="module" src="/web/ui/dist/maple-ui.js"></script>
</body>

</html>
