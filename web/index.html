<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapleStory</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23121821'/%3E%3Cpath fill='%23ff5252' d='M16 4l2.2 5.1 5.3-1.3-2.6 4.8 4.8 2.6-5.1 1.3 1.3 5.3-4.8-2.6L16 28l-1.4-5.5-4.8 2.6 1.3-5.3-5.1-1.3 4.8-2.6L8 8.8l5.3 1.3z'/%3E%3C/svg%3E">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }

        #container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #canvas {
            border: none;
            background-color: #000;
            display: block;
            outline: none;
            cursor: none;
            /* Fallback for the pre-engine 800x600 surface; once the engine
               drives a native-resolution backing store no CSS scaling occurs. */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* Branded loading overlay shown until the engine runtime is ready. */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            background: radial-gradient(circle at 50% 38%, #1b2330 0%, #0a0d13 70%, #05070a 100%);
            transition: opacity 0.6s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading .logo {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #fff 0%, #ffd0d0 60%, #ff7676 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 18px rgba(255, 80, 80, 0.25);
        }

        #loading .logo span {
            color: #ff5252;
            -webkit-text-fill-color: #ff5252;
        }

        #loading .spinner {
            width: 46px;
            height: 46px;
            border: 4px solid rgba(255, 255, 255, 0.12);
            border-top-color: #ff5252;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading .status {
            font-size: 13px;
            color: #8b96a8;
            min-height: 16px;
            letter-spacing: 0.3px;
        }
    </style>

    <!--
      Keyboard isolation between the DOM overlay UI and the WASM/GLFW engine.
      The Emscripten GLFW port registers capture-phase key listeners on `window`
      and preventDefault()s Backspace/Tab, which otherwise makes those keys dead
      inside DOM form fields (you can't erase or tab between login inputs) and
      lets the character react to keystrokes while you're typing in chat. By
      registering our own capture-phase listeners *before* the engine script
      loads, we get first crack at every key event and can keep the engine out
      of anything destined for a DOM input.
    -->
    <script>
        (function () {
            function isEditable(el) {
                if (!el || el.nodeType !== 1) {
                    return false;
                }
                var tag = el.tagName;
                return tag === 'INPUT' || tag === 'TEXTAREA' ||
                       tag === 'SELECT' || el.isContentEditable;
            }

            function onKey(e) {
                var t = e.target;

                if (isEditable(t)) {
                    // A DOM field owns this keystroke. Keep default browser
                    // behavior (typing, Backspace, Tab focus, form submit) but
                    // stop the event before the engine's GLFW handler sees it.
                    if (e.type === 'keydown') {
                        if (e.key === 'Escape') {
                            t.blur();
                            e.preventDefault();
                        } else if (e.key === 'Tab' &&
                                   t.getAttribute('data-testid') === 'hud-chat-input') {
                            // Tab cycles chat channels rather than moving focus.
                            e.preventDefault();
                            window.dispatchEvent(new CustomEvent('maple:chatchannel',
                                { detail: { dir: e.shiftKey ? -1 : 1 } }));
                        }
                    }
                    e.stopImmediatePropagation();
                    return;
                }

                // Not in a DOM field: the DOM overlay owns Escape (it closes
                // the topmost window/shop/dialog, or opens the system menu when
                // nothing is open), so keep it away from the engine entirely.
                if (e.type === 'keydown' && e.key === 'Escape') {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    window.dispatchEvent(new CustomEvent('maple:escape'));
                }
            }

            window.addEventListener('keydown', onKey, true);
            window.addEventListener('keypress', onKey, true);
            window.addEventListener('keyup', onKey, true);
        })();
    </script>

    <!--
      Default render-quality seed. The WASM engine reads `maple.supersample`
      from localStorage at startup (GraphicsGL::init) to pick its scene
      supersample factor. Seeding the crisp default (1x) here — before the
      engine boots — makes a fresh client render sharp pixel art out of the box
      even against an already-built engine bundle, without a recompile. Only
      sets it when unset, so a user's saved Quality choice (Settings) wins.
    -->
    <script>
        (function () {
            try {
                if (localStorage.getItem('maple.supersample') === null) {
                    localStorage.setItem('maple.supersample', '1');
                }
            } catch (e) { /* storage unavailable — engine falls back to 1x */ }
        })();
    </script>
</head>

<body>
    <div id="container">
        <canvas id="canvas" tabindex="-1"></canvas>
    </div>

    <!-- MapleBridge React/TS overlay UI mount point. -->
    <div id="maple-ui-root"></div>

    <div id="loading">
        <div class="logo">Maple<span>Story</span></div>
        <div class="spinner"></div>
        <div class="status" id="loading-status">Loading game…</div>
    </div>

    <!-- HD UI override loader: preloads high-res UI art and bridges it to WASM. -->
    <script src="/web/hd_assets.js"></script>

    <script>
        (function () {
            const GAME_WIDTH = 800;
            const GAME_HEIGHT = 600;
            // The engine renders the scene supersampled at 4x game resolution
            // (GraphicsGL MAX_SUPERSAMPLE). There is no source detail beyond
            // this, so the output backing store is clamped to it.
            const SCENE_W = GAME_WIDTH * 4;
            const SCENE_H = GAME_HEIGHT * 4;

            // Backing-store multiplier over the CSS size. This MUST default to
            // 1 (native): a value >1 makes the canvas backing store larger than
            // the element's on-screen size, forcing the browser to bilinear-
            // downscale every frame, which blurs the low-res pixel art and
            // wastes fill rate. At 1 the backing store equals CSS x devicePixel-
            // Ratio, so the engine's own sharp-bilinear pass is the only resample
            // and the result is presented 1:1 (crisp). Kept as a knob only for
            // experimentation; there is no reason to oversample beyond native.
            function getRenderScale() {
                try {
                    const v = parseFloat(localStorage.getItem('maple.renderScale'));
                    if (Number.isFinite(v) && v >= 1 && v <= 4) {
                        return v;
                    }
                } catch (e) { /* ignore */ }
                return 1;
            }

            function syncCanvasResolution(canvas, cssWidth, cssHeight) {
                const setSize = (typeof Module !== 'undefined' && typeof Module._wasm_set_canvas_size === 'function')
                    ? Module._wasm_set_canvas_size
                    : null;

                if (setSize) {
                    // Backing store = CSS size x devicePixelRatio x renderScale,
                    // clamped to the supersampled scene resolution (no detail
                    // exists beyond it, and overshooting only costs fill rate).
                    const dpr = window.devicePixelRatio || 1;
                    const q = dpr * getRenderScale();
                    let w = Math.round(cssWidth * q);
                    let h = Math.round(cssHeight * q);
                    if (w > SCENE_W) { h = Math.round(h * SCENE_W / w); w = SCENE_W; }
                    if (h > SCENE_H) { w = Math.round(w * SCENE_H / h); h = SCENE_H; }
                    setSize(Math.max(1, w), Math.max(1, h));
                } else if (canvas.width !== GAME_WIDTH || canvas.height !== GAME_HEIGHT) {
                    // Engine not loaded yet: keep the game-resolution surface.
                    canvas.width = GAME_WIDTH;
                    canvas.height = GAME_HEIGHT;
                }
            }

            function getFittedCanvasSize(viewW, viewH) {
                if (viewW * GAME_HEIGHT <= viewH * GAME_WIDTH) {
                    const width = Math.max(1, Math.floor(viewW));
                    return {
                        width,
                        height: Math.max(1, Math.floor(width * GAME_HEIGHT / GAME_WIDTH))
                    };
                }

                const height = Math.max(1, Math.floor(viewH));
                return {
                    width: Math.max(1, Math.floor(height * GAME_WIDTH / GAME_HEIGHT)),
                    height
                };
            }

            function fitCanvas() {
                const canvas = document.getElementById('canvas');
                if (!canvas) {
                    return;
                }

                const { width, height } = getFittedCanvasSize(window.innerWidth, window.innerHeight);

                // Resize the engine's backing store first: Emscripten clears the
                // inline CSS size during the resize, so the CSS scale goes last.
                syncCanvasResolution(canvas, width, height);

                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
            }

            window.MapleWasmUI = {
                applyScale: fitCanvas,
                getRenderScale: getRenderScale,
                // Persist and apply a new Render Quality multiplier immediately.
                setRenderScale: function (scale) {
                    try {
                        localStorage.setItem('maple.renderScale', String(scale));
                    } catch (e) { /* ignore */ }
                    fitCanvas();
                }
            };

            window.addEventListener('resize', fitCanvas);
            document.addEventListener('fullscreenchange', fitCanvas);
            fitCanvas();
        })();

        Module = {
            canvas: (function () {
                let canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. You will need to reload the page.');
                    e.preventDefault();
                }, false);
                canvas.addEventListener("click", function () {
                    canvas.focus();
                });
                return canvas;
            })(),

            // Disable stdin to prevent annoying prompt() popups
            preRun: [function () {
                function stdin() {
                    return null; // Return null for EOF
                }
                FS.init(stdin, null, null);
            }],

            print: function (text) {
                console.log('[stdout]', text);
            },

            printErr: function (text) {
                console.error('[stderr]', text);
            },

            setStatus: function (text) {
                if (text) {
                    console.log('[status]', text);
                    var el = document.getElementById('loading-status');
                    if (el) {
                        el.textContent = text;
                    }
                }
            },

            monitorRunDependencies: function (left) {
                console.log('[dependencies]', left, 'remaining');
                var el = document.getElementById('loading-status');
                if (el) {
                    el.textContent = left > 0
                        ? 'Loading game data… (' + left + ')'
                        : 'Starting engine…';
                }
            },

            onRuntimeInitialized: function () {
                console.log('[runtime] Initialized');
                // Engine is up: cancel the boot watchdog so it never fires.
                if (window.__mapleBootWatchdog) {
                    clearTimeout(window.__mapleBootWatchdog);
                    window.__mapleBootWatchdog = null;
                }
                if (window.MapleWasmUI && window.MapleWasmUI.applyScale) {
                    window.MapleWasmUI.applyScale();
                }
                // Reveal the game once the engine is up; give the first frame a
                // moment to render so we don't flash a black canvas.
                setTimeout(function () {
                    var overlay = document.getElementById('loading');
                    if (overlay) {
                        overlay.classList.add('hidden');
                        setTimeout(function () { overlay.remove(); }, 700);
                    }
                }, 600);
            },

            // Bridge for the HD asset override system (see hd_assets.js).
            hdGetScaled: function (key, hw, hh, ptr) {
                return (window.MapleHD && window.MapleHD.getScaled)
                    ? window.MapleHD.getScaled(key, hw, hh, ptr)
                    : 0;
            },

            // Function to add C++ logs - now just console
            addCppLog: function (level, message) {
                let timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
                console.log('[' + timestamp + '] [' + level + '] ' + message);
            }
        };

        console.log('[status] Downloading...');

        window.onerror = function (event) {
            console.error('[post-exception status] Exception thrown, see JavaScript console');
        };

        // WebGL preflight. The engine renders entirely through WebGL; if the
        // browser can't hand out a context (e.g. Brave's GPU process crash-loops
        // on the Vulkan/Wayland path on some Linux setups) the canvas stays black
        // with only a cryptic "Failed to create window" in the console. Detect it
        // up front and show actionable guidance instead.
        function webglAvailable() {
            try {
                var c = document.createElement('canvas');
                return !!(c.getContext('webgl2') || c.getContext('webgl') ||
                          c.getContext('experimental-webgl'));
            } catch (e) {
                return false;
            }
        }

        function showWebglError() {
            var overlay = document.getElementById('loading');
            if (!overlay) {
                return;
            }
            overlay.classList.remove('hidden');
            overlay.innerHTML =
                '<div class="logo">Maple<span>Story</span></div>' +
                '<div style="max-width:540px;text-align:center;line-height:1.6;color:#cdd6e4;font-size:14px">' +
                '<p style="font-size:18px;color:#fff;margin-bottom:14px">Your browser couldn’t start WebGL</p>' +
                '<p>The game renders with hardware-accelerated WebGL, which this browser isn’t currently providing. ' +
                'In <b>Brave</b> on Linux this is usually the GPU process failing on Vulkan. To fix it:</p>' +
                '<p style="text-align:left;display:inline-block;margin-top:10px">' +
                '1. Open <b>brave://settings/system</b> and turn <b>off</b> “Use&nbsp;graphics&nbsp;acceleration when available”, <i>or</i><br>' +
                '2. Open <b>brave://flags</b>, set <b>Vulkan</b> to <b>Disabled</b>, <i>or</i><br>' +
                '3. Launch Brave with <code>--disable-features=Vulkan</code> (or <code>--ozone-platform=x11</code>).<br>' +
                '<span style="color:#8b96a8">Then fully quit and reopen Brave. Verify at <b>brave://gpu</b> that WebGL is enabled.</span></p>' +
                '</div>';
        }

        if (!webglAvailable()) {
            showWebglError();
            throw new Error('WebGL unavailable — aborting engine load.');
        }

        // Fetch configuration before loading the client
        fetch('/web/config.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(config => {
                if (config) {
                    let hasConfig = false;
                    const lazyConfig = {};

                    const lazyConfigKeys = [
                        'AssetsServerIP', 'AssetsServerPort',
                        'MapleStoryServerIp', 'MapleStoryServerPort',
                        'ProxyIP', 'ProxyPort', 'AssetsServerProtocol'
                    ];

                    lazyConfigKeys.forEach(key => {
                        if (config[key] !== undefined && config[key] !== null) {
                            lazyConfig[key] = config[key];
                            console.log(`[config] Set ${key} from config.json:`, config[key]);
                            hasConfig = true;
                        }
                    });

                    if (hasConfig) {
                        Module.LazyFS = Object.assign(Module.LazyFS || {}, lazyConfig);
                    }
                }
                loadWasmClient();
            })
            .catch(err => {
                console.warn('[config] Could not load /web/config.json, proceeding with defaults. Error:', err.message);
                loadWasmClient();
            });

        // Boot watchdog: the engine renders nothing of its own until
        // onRuntimeInitialized fires. If a run dependency stalls (a wedged
        // asset fetch, a half-loaded build behind a stale tab, a GPU process
        // that died after the WebGL preflight passed) the overlay would
        // otherwise spin on "Loading game data…" forever with no guidance.
        // Surface an actionable message instead.
        var BOOT_TIMEOUT_MS = 30000;

        function showBootTimeout() {
            var overlay = document.getElementById('loading');
            if (!overlay) {
                return;
            }
            overlay.classList.remove('hidden');
            overlay.innerHTML =
                '<div class="logo">Maple<span>Story</span></div>' +
                '<div style="max-width:540px;text-align:center;line-height:1.6;color:#cdd6e4;font-size:14px">' +
                '<p style="font-size:18px;color:#fff;margin-bottom:14px">The game is taking longer than expected to start</p>' +
                '<p>The engine hasn’t finished loading. This is usually a stale tab left open across a server restart, ' +
                'or a stalled asset download.</p>' +
                '<p style="margin-top:10px"><button onclick="location.reload(true)" ' +
                'style="background:#ff5252;color:#fff;border:none;padding:10px 22px;border-radius:7px;' +
                'font-size:14px;font-weight:700;cursor:pointer">Reload</button></p>' +
                '<p style="color:#8b96a8;margin-top:8px">If reloading doesn’t help, open the browser console ' +
                '(F12) and check for errors.</p>' +
                '</div>';
        }

        function loadWasmClient() {
            window.__mapleBootWatchdog = setTimeout(showBootTimeout, BOOT_TIMEOUT_MS);
            const script = document.createElement('script');
            script.src = '/build/JourneyClient.js';
            script.async = true;
            script.onerror = function () {
                console.error('[boot] Failed to load /build/JourneyClient.js');
                if (window.__mapleBootWatchdog) {
                    clearTimeout(window.__mapleBootWatchdog);
                    window.__mapleBootWatchdog = null;
                }
                showBootTimeout();
            };
            document.body.appendChild(script);
        }
    </script>

    <!-- MapleBridge overlay UI bundle. -->
    <link rel="stylesheet" href="/web/ui/dist/maple-ui.css" />
    <script type="module" src="/web/ui/dist/maple-ui.js"></script>
</body>

</html>
